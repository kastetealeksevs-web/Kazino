<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Kazino Šedevrs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: Arial, sans-serif; background: #111; color: #fff; overflow: hidden; }

  /* Video fons */
  #video-bg {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: -2;
    filter: brightness(0.4);
  }

  /* Baneris */
  .banner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%; max-width: 1200px;
    background: linear-gradient(135deg, #ff0044, #ffcc00);
    border-radius: 25px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 0 50px rgba(255,0,68,0.7);
    animation: glow 2s infinite alternate;
  }
  @keyframes glow {
    0% { box-shadow: 0 0 20px rgba(255,0,68,0.6); }
    100% { box-shadow: 0 0 50px rgba(255,255,0,0.9); }
  }

  h1 {
    font-size: 3em;
    text-transform: uppercase;
    margin-bottom: 20px;
    letter-spacing: 3px;
    text-shadow: 2px 2px 10px #000;
  }
  p {
    font-size: 1.2em;
    margin-bottom: 30px;
    text-shadow: 1px 1px 5px #000;
  }

  .btn {
    display: inline-block;
    padding: 20px 50px;
    font-size: 1.5em;
    color: #fff;
    background: linear-gradient(45deg, #ff0044, #ffcc00);
    border: none;
    border-radius: 15px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(255,255,0,0.7);
    text-decoration: none;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 50px rgba(255,255,0,1);
  }

  .slots {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 2.5em;
    margin-top: 30px;
  }
  .slot {
    width: 60px; height: 60px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex; justify-content: center; align-items: center;
    animation: slotSpin 1s infinite;
  }
  @keyframes slotSpin {
    0%   { transform: translateY(0); }
    25%  { transform: translateY(-20%); }
    50%  { transform: translateY(-40%); }
    75%  { transform: translateY(-60%); }
    100% { transform: translateY(0); }
  }

  .confetti {
    position: fixed;
    width: 10px; height: 10px;
    top: -10px;
    animation: fall 3s linear infinite;
    opacity: 0.8;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>
<body>

<video id="video-bg" autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="banner">
  <h1>Milzīgs Kazino Šedevrs</h1>
  <p>Spēlē šeit un izmanto bonusu!</p>

  <a class="btn" href="https://1f0s0.club/r/49DCQ0BBB" target="_blank">Reģistrējies Tagad</a>

  <div class="slots">
    <div class="slot">🍒</div>
    <div class="slot">7️⃣</div>
    <div class="slot">💎</div>
  </div>
</div>

<script>
  for (let i = 0; i < 150; i++){
    let c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = 'hsl(' + Math.random()*360 + ', 100%, 50%)';
    c.style.animationDuration = (2 + Math.random()*3) + 's';
    c.style.width = (5 + Math.random()*10) + 'px';
    c.style.height = c.style.width;
    document.body.appendChild(c);
  }

  const slotElems = document.querySelectorAll('.slot');
  setInterval(()=>{
    slotElems.forEach(s => {
      const icons = ['🍒','7️⃣','💎','🍋','⭐','🔔'];
      s.textContent = icons[Math.floor(Math.random() * icons.length)];
    });
  }, 500);
</script>

</body>
</html>
